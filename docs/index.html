<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EndpointFeed // Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #0a0c0f;
      --bg2:        #0f1318;
      --bg3:        #151a21;
      --border:     #1e2730;
      --border2:    #263040;
      --text:       #c8d6e5;
      --text-dim:   #566a7f;
      --text-mute:  #2e3d4d;
      --green:      #00cc6a;
      --yellow:     #ffd700;
      --red:        #ff4444;
      --yt-red:     #ff0000;
      --pod-green:  #1db954;
      --font-mono:  'JetBrains Mono', monospace;
      --font-ui:    'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-mono); font-size: 13px; line-height: 1.6; min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
      height: 56px; position: sticky; top: 0; z-index: 200;
    }
    .logo {
      font-family: var(--font-ui); font-weight: 800; font-size: 18px;
      letter-spacing: -0.5px; color: #fff;
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .logo-icon { width: 28px; height: 28px; background: #0078d4; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
    .logo em { color: #50e6ff; font-style: normal; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    #last-updated { font-size: 11px; color: var(--text-dim); }
    #last-updated b { color: var(--green); }
    .icon-btn {
      background: var(--bg3); border: 1px solid var(--border2); color: var(--text-dim);
      font-family: var(--font-mono); font-size: 11px; padding: 5px 12px;
      border-radius: 4px; cursor: pointer; transition: all 0.2s;
    }
    .icon-btn:hover { border-color: #0078d4; color: #50e6ff; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 9px 24px; display: flex; align-items: center; gap: 7px;
      flex-wrap: wrap; position: sticky; top: 56px; z-index: 100;
    }
    .cat-pill {
      display: flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-dim);
      font-family: var(--font-mono); font-size: 11px; padding: 4px 11px;
      border-radius: 3px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .cat-pill .pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cat-pill:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .search-wrap { position: relative; margin-left: auto; }
    .search-wrap::before { content: '⌕'; position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-mute); font-size: 14px; pointer-events: none; }
    #search {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      font-family: var(--font-mono); font-size: 12px; padding: 5px 12px 5px 28px;
      border-radius: 4px; width: 240px; outline: none; transition: border-color 0.2s;
    }
    #search:focus { border-color: #0078d4; }
    #search::placeholder { color: var(--text-mute); }

    /* ── STATS ── */
    .stats-bar {
      padding: 7px 24px; display: flex; gap: 20px; align-items: center;
      border-bottom: 1px solid var(--border); background: var(--bg); flex-wrap: wrap;
    }
    .stat { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
    .stat b { color: var(--text); }
    .pulse { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,204,106,0.5);} 50%{opacity:0.6;box-shadow:0 0 0 5px rgba(0,204,106,0);} }

    /* ── LAYOUT ── */
    .container { max-width: 1600px; margin: 0 auto; padding: 16px 24px 48px; display: flex; flex-direction: column; gap: 8px; }

    /* ── CATEGORY SECTION ── */
    .cat-section { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .cat-header {
      display: flex; align-items: center; gap: 12px; padding: 0 18px; height: 48px;
      background: var(--bg2); cursor: pointer; user-select: none;
      transition: background 0.15s; border-bottom: 1px solid transparent;
    }
    .cat-header:hover { background: var(--bg3); }
    .cat-section.open .cat-header { border-bottom-color: var(--border); }
    .cat-stripe { width: 4px; height: 22px; border-radius: 2px; flex-shrink: 0; }
    .cat-name { font-family: var(--font-ui); font-weight: 700; font-size: 14px; color: #fff; flex: 1; display: flex; align-items: center; gap: 10px; }
    .cat-badge { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); background: var(--bg); border: 1px solid var(--border); padding: 1px 8px; border-radius: 10px; }
    .cat-sources { font-size: 10px; color: var(--text-mute); margin-right: 4px; }
    .cat-chevron { font-size: 10px; color: var(--text-mute); transition: transform 0.25s; }
    .cat-section.open .cat-chevron { transform: rotate(180deg); }
    .cat-body { display: none; padding: 14px; background: var(--bg); }
    .cat-section.open .cat-body { display: block; }

    /* ── FEED GRID (articles) ── */
    .feed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }

    /* ── MEDIA LAYOUT ── */
    /* YouTube and podcasts each get their own horizontal scroll row */
    .media-section-label {
      font-family: var(--font-ui); font-size: 11px; font-weight: 600;
      color: var(--text-mute); text-transform: uppercase; letter-spacing: 1.5px;
      padding: 0 2px 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .media-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .media-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
    .media-row::-webkit-scrollbar { height: 4px; }
    .media-row::-webkit-scrollbar-track { background: transparent; }
    .media-row::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .media-gap { height: 20px; }

    /* ── YOUTUBE CARD ── */
    .yt-card {
      flex: 0 0 240px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 5px; overflow: hidden; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      animation: rise 0.35s ease forwards; opacity: 0;
    }
    .yt-card:hover { border-color: var(--yt-red); transform: translateY(-2px); }
    .yt-thumb {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: var(--bg3); overflow: hidden;
    }
    .yt-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .yt-play {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.15s;
    }
    .yt-card:hover .yt-play { opacity: 1; }
    .yt-play-icon {
      width: 40px; height: 40px; background: var(--yt-red); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .yt-channel-badge {
      position: absolute; bottom: 6px; left: 6px;
      background: rgba(0,0,0,0.75); font-size: 9px; color: #fff;
      padding: 2px 6px; border-radius: 2px; font-family: var(--font-mono);
    }
    .yt-info { padding: 9px 10px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .yt-title { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: color 0.15s; }
    .yt-card:hover .yt-title { color: #50e6ff; }
    .yt-meta { font-size: 10px; color: var(--text-mute); display: flex; gap: 8px; }
    .badge-new-sm { font-size: 9px; background: rgba(0,204,106,0.12); color: var(--green); border: 1px solid rgba(0,204,106,0.3); padding: 1px 5px; border-radius: 2px; }

    /* ── PODCAST CARD ── */
    .pod-card {
      flex: 0 0 300px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 5px; overflow: hidden; display: flex; flex-direction: column;
      cursor: pointer; transition: border-color 0.15s, transform 0.15s;
      animation: rise 0.35s ease forwards; opacity: 0;
    }
    .pod-card:hover { border-color: var(--pod-green); transform: translateY(-2px); }
    .pod-header { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border); background: var(--bg3); }
    .pod-art { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; background: var(--bg); flex-shrink: 0; }
    .pod-art-placeholder { width: 44px; height: 44px; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .pod-show { flex: 1; min-width: 0; }
    .pod-show-name { font-family: var(--font-ui); font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pod-show-type { font-size: 10px; color: var(--pod-green); margin-top: 1px; }
    .pod-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .pod-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: color 0.15s; text-decoration: none; }
    .pod-card:hover .pod-title { color: #50e6ff; }
    .pod-meta { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-mute); }
    .pod-duration { display: flex; align-items: center; gap: 4px; }
    .pod-player { margin-top: 4px; }
    .pod-player audio { width: 100%; height: 32px; outline: none; filter: invert(1) hue-rotate(180deg) brightness(0.85); }

    /* ── ARTICLE CARD ── */
    .feed-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 5px; overflow: hidden; display: flex; flex-direction: column;
      animation: rise 0.35s ease forwards; opacity: 0;
    }
    @keyframes rise { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
    .card-header { padding: 9px 13px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .card-title { font-family: var(--font-ui); font-weight: 600; font-size: 12px; color: #fff; flex:1; }
    .card-count { font-size: 10px; color: var(--text-mute); background: var(--bg); border: 1px solid var(--border); padding: 1px 6px; border-radius: 8px; }
    .card-err { font-size: 10px; color: var(--red); border: 1px solid rgba(255,68,68,0.3); background: rgba(255,68,68,0.05); padding: 1px 6px; border-radius: 8px; }

    .article { display: block; text-decoration: none; color: inherit; padding: 10px 13px; border-bottom: 1px solid var(--border); transition: background 0.12s; cursor: pointer; }
    .article:last-child { border-bottom: none; }
    .article:hover { background: rgba(255,255,255,0.03); }
    .article:hover .article-title { color: #50e6ff; }
    .article-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .article-date { font-size: 10px; color: var(--text-mute); font-variant-numeric: tabular-nums; }
    .article-author { font-size: 10px; color: var(--text-mute); }
    .article-author::before { content: '·'; margin-right: 8px; }
    .badge-new { font-size: 9px; letter-spacing: 0.5px; background: rgba(0,204,106,0.12); color: var(--green); border: 1px solid rgba(0,204,106,0.3); padding: 1px 5px; border-radius: 2px; }
    .article-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.45; margin-bottom: 3px; transition: color 0.12s; }
    .article-summary { font-size: 11px; color: var(--text-dim); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .article-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .article-tag { font-size: 9px; color: var(--text-mute); border: 1px solid var(--border); padding: 1px 5px; border-radius: 2px; }
    .feed-error { padding: 14px 13px; font-size: 11px; color: var(--red); opacity: 0.7; }

    #loading { padding: 60px 0; text-align: center; color: var(--text-dim); }
    .spinner { width: 30px; height: 30px; border: 2px solid var(--border2); border-top-color: #0078d4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to{transform:rotate(360deg);} }

    footer { border-top: 1px solid var(--border); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-mute); }

    @media (max-width: 680px) {
      .feed-grid { grid-template-columns: 1fr; }
      .search-wrap { margin-left: 0; width: 100%; order: 99; }
      #search { width: 100%; }
      .container, header, .toolbar, .stats-bar, footer { padding-left: 14px; padding-right: 14px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">⬡</div>
    Endpoint<em>Feed</em>
  </a>
  <div class="header-right">
    <div id="last-updated">Loading…</div>
    <button class="icon-btn" onclick="loadFeeds()">↺ Refresh</button>
    <button class="icon-btn" id="toggle-all-btn" onclick="toggleAll()">⊞ Expand All</button>
  </div>
</header>

<div class="toolbar" id="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search all articles…" oninput="handleSearch()" />
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><span class="pulse"></span>Live</div>
  <div class="stat">Articles: <b id="stat-total">—</b></div>
  <div class="stat">Sources: <b id="stat-sources">—</b></div>
  <div class="stat">Updated: <b id="stat-updated">—</b></div>
</div>

<div class="container">
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading feeds…</div>
    <div style="font-size:11px;color:var(--text-mute);margin-top:6px">fetching feeds.json</div>
  </div>
  <div id="cats" style="display:contents"></div>
</div>

<footer>
  <span>EndpointFeed · Endpoint intelligence dashboard</span>
  <span id="footer-ts"></span>
</footer>

<script>
const CATEGORIES = [
  { id:'intune',      label:'Intune',                color:'#0078d4' },
  { id:'sccm',        label:'SCCM / ConfigMgr',      color:'#005a9e' },
  { id:'security',    label:'Endpoint Security',      color:'#d13438' },
  { id:'m365',        label:'M365 / Office 365',      color:'#d83b01' },
  { id:'entra',       label:'Azure AD / Entra ID',    color:'#7719aa' },
  { id:'powershell',  label:'PowerShell / Scripting', color:'#4a9fff' },
  { id:'windows',     label:'Windows Updates / WSUS', color:'#00788a' },
  { id:'apple',       label:'Apple',                  color:'#8e8e93' },
  { id:'media',       label:'Media',                  color:'#e8436a' },
];

let allFeeds = [];
let openSet  = new Set(['intune']);
let allOpen  = false;

function buildToolbar() {
  const bar = document.getElementById('toolbar');
  bar.querySelectorAll('.cat-pill').forEach(p => p.remove());
  const sw = bar.querySelector('.search-wrap');

  bar.insertBefore(makePill('All', '#50e6ff', null), sw);
  CATEGORIES.forEach(cat => bar.insertBefore(makePill(cat.label, cat.color, cat.id), sw));
}

function makePill(label, color, catId) {
  const btn = document.createElement('button');
  btn.className = 'cat-pill';
  btn.innerHTML = `<span class="pip" style="background:${color}"></span>${label}`;
  btn.onclick = () => {
    if (!catId) { window.scrollTo({top:0,behavior:'smooth'}); return; }
    const el = document.getElementById('cat-'+catId);
    if (el) {
      if (!openSet.has(catId)) { openSet.add(catId); el.classList.add('open'); }
      setTimeout(() => el.scrollIntoView({behavior:'smooth',block:'start'}), 50);
    }
  };
  return btn;
}

function toggleAll() {
  allOpen = !allOpen;
  if (allOpen) {
    CATEGORIES.forEach(c => openSet.add(c.id));
    document.querySelectorAll('.cat-section').forEach(s => s.classList.add('open'));
    document.getElementById('toggle-all-btn').textContent = '⊟ Collapse All';
  } else {
    openSet.clear(); openSet.add('intune');
    document.querySelectorAll('.cat-section').forEach(s => s.classList.toggle('open', s.id==='cat-intune'));
    document.getElementById('toggle-all-btn').textContent = '⊞ Expand All';
  }
}

async function loadFeeds() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('cats').innerHTML = '';
  document.getElementById('last-updated').textContent = 'Loading…';
  try {
    const res = await fetch('feeds.json?_='+Date.now());
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    allFeeds = data.feeds || [];

    const total = allFeeds.reduce((a,f)=>a+(f.items?.length||0),0);
    const ok    = allFeeds.filter(f=>!f.error).length;
    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-sources').textContent = `${ok}/${allFeeds.length}`;

    if (data.generatedAt) {
      const d   = new Date(data.generatedAt);
      const fmt = d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      document.getElementById('stat-updated').textContent = fmt;
      document.getElementById('last-updated').innerHTML  = `Updated <b>${fmt}</b>`;
      document.getElementById('footer-ts').textContent   = `Last fetch: ${fmt}`;
    } else {
      document.getElementById('last-updated').innerHTML =
        `<span style="color:var(--yellow)">⚠ No data — run the GitHub Action</span>`;
      document.getElementById('stat-updated').textContent = 'Never';
    }
    buildToolbar();
    renderAll('');
  } catch(err) {
    document.getElementById('loading').innerHTML = `
      <div style="font-size:22px;margin-bottom:10px">⚠</div>
      <div style="color:var(--red)">Failed to load feeds</div>
      <div style="font-size:11px;color:var(--text-mute);margin-top:4px">${esc(err.message)}</div>`;
  }
}

function renderAll(query) {
  document.getElementById('loading').style.display = 'none';
  const container = document.getElementById('cats');
  container.innerHTML = '';
  let delay = 0;
  for (const cat of CATEGORIES) {
    const feeds = allFeeds.filter(f => f.category === cat.id).map(f => ({
      ...f,
      items: (f.items||[]).filter(i =>
        !query || (i.title+' '+(i.summary||'')).toLowerCase().includes(query)
      )
    }));
    if (!feeds.length) continue;
    const vis = feeds.reduce((a,f)=>a+f.items.length,0);
    if (query && vis === 0) continue;
    container.appendChild(buildCatSection(cat, feeds, delay, query));
    delay += 55;
  }
  document.getElementById('stat-total').textContent =
    document.querySelectorAll('.article, .yt-card, .pod-card').length
    || allFeeds.reduce((a,f)=>a+(f.items?.length||0),0);
}

function buildCatSection(cat, feeds, delay, query) {
  const isOpen = openSet.has(cat.id) || !!query;
  const total  = feeds.reduce((a,f)=>a+f.items.length,0);
  const errCnt = feeds.filter(f=>f.error).length;

  const sec = document.createElement('div');
  sec.className = 'cat-section' + (isOpen?' open':'');
  sec.id = 'cat-'+cat.id;

  const hdr = document.createElement('div');
  hdr.className = 'cat-header';
  hdr.innerHTML = `
    <div class="cat-stripe" style="background:${cat.color}"></div>
    <div class="cat-name">
      ${esc(cat.label)}
      <span class="cat-badge">${total} item${total!==1?'s':''}</span>
      ${errCnt?`<span style="font-size:10px;color:var(--red);font-family:var(--font-mono)">${errCnt} err</span>`:''}
    </div>
    <span class="cat-sources">${feeds.length} source${feeds.length!==1?'s':''}</span>
    <span class="cat-chevron">▼</span>`;
  hdr.onclick = () => {
    const was = sec.classList.contains('open');
    sec.classList.toggle('open', !was);
    was ? openSet.delete(cat.id) : openSet.add(cat.id);
  };

  const body = document.createElement('div');
  body.className = 'cat-body';

  if (cat.id === 'media') {
    body.appendChild(buildMediaBody(feeds, query));
  } else {
    const grid = document.createElement('div');
    grid.className = 'feed-grid';
    feeds.forEach((feed, i) => grid.appendChild(buildArticleCard(feed, query, i*45)));
    body.appendChild(grid);
  }

  sec.appendChild(hdr);
  sec.appendChild(body);
  return sec;
}

// ── Media body: YouTube row + Podcast row ──────────────
function buildMediaBody(feeds, query) {
  const wrap = document.createElement('div');

  const ytFeeds  = feeds.filter(f => f.type === 'youtube');
  const podFeeds = feeds.filter(f => f.type === 'podcast');

  if (ytFeeds.length) {
    const ytItems = ytFeeds.flatMap(f => f.items.map(i => ({...i, _feedLabel: f.label})));
    if (ytItems.length) {
      const lbl = document.createElement('div');
      lbl.className = 'media-section-label';
      lbl.innerHTML = `▶ YouTube`;
      wrap.appendChild(lbl);

      const row = document.createElement('div');
      row.className = 'media-row';
      ytItems.forEach((item, i) => row.appendChild(buildYoutubeCard(item, i)));
      wrap.appendChild(row);
    }
  }

  if (podFeeds.length) {
    const podItems = podFeeds.flatMap(f => f.items.map(i => ({...i, _feedLabel: f.label})));
    if (podItems.length) {
      if (ytFeeds.length) {
        const gap = document.createElement('div');
        gap.className = 'media-gap';
        wrap.appendChild(gap);
      }

      const lbl = document.createElement('div');
      lbl.className = 'media-section-label';
      lbl.innerHTML = `🎙 Podcasts`;
      wrap.appendChild(lbl);

      const row = document.createElement('div');
      row.className = 'media-row';
      podItems.forEach((item, i) => row.appendChild(buildPodcastCard(item, i)));
      wrap.appendChild(row);
    }
  }

  return wrap;
}

function buildYoutubeCard(item, index) {
  const a = document.createElement('a');
  a.className = 'yt-card';
  a.href = item.link;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.style.animationDelay = (index * 50) + 'ms';

  const now    = Date.now();
  const pub    = item.pubDate ? new Date(item.pubDate) : null;
  const isNew  = pub && (now - pub.getTime()) < 172800000;
  const ds     = pub ? pub.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';
  const thumb  = item.thumbnail || `https://i.ytimg.com/vi/${item.videoId}/mqdefault.jpg`;

  a.innerHTML = `
    <div class="yt-thumb">
      <img src="${esc(thumb)}" alt="" loading="lazy" onerror="this.style.display='none'" />
      <div class="yt-play"><div class="yt-play-icon">▶</div></div>
      <div class="yt-channel-badge">${esc(item._feedLabel || '')}</div>
    </div>
    <div class="yt-info">
      <div class="yt-title">${esc(item.title)}</div>
      <div class="yt-meta">
        ${ds ? `<span>${ds}</span>` : ''}
        ${isNew ? '<span class="badge-new-sm">NEW</span>' : ''}
      </div>
    </div>`;
  return a;
}

function buildPodcastCard(item, index) {
  const card = document.createElement('div');
  card.className = 'pod-card';
  card.style.animationDelay = (index * 50) + 'ms';

  const now   = Date.now();
  const pub   = item.pubDate ? new Date(item.pubDate) : null;
  const isNew = pub && (now - pub.getTime()) < 172800000;
  const ds    = pub ? pub.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';
  const thumb = item.thumbnail;

  const artHtml = thumb
    ? `<img class="pod-art" src="${esc(thumb)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=pod-art-placeholder>🎙</div>'" />`
    : `<div class="pod-art-placeholder">🎙</div>`;

  card.innerHTML = `
    <div class="pod-header">
      ${artHtml}
      <div class="pod-show">
        <div class="pod-show-name">${esc(item._feedLabel || 'Podcast')}</div>
        <div class="pod-show-type">● PODCAST</div>
      </div>
    </div>
    <div class="pod-body">
      <a class="pod-title" href="${esc(item.link)}" target="_blank" rel="noopener noreferrer">
        ${esc(item.title)}
        ${isNew ? '<span class="badge-new-sm" style="margin-left:6px">NEW</span>' : ''}
      </a>
      <div class="pod-meta">
        ${ds ? `<span>${ds}</span>` : ''}
        ${item.duration ? `<span class="pod-duration">⏱ ${esc(item.duration)}</span>` : ''}
      </div>
      ${item.audioUrl
        ? `<div class="pod-player"><audio controls preload="none" src="${esc(item.audioUrl)}"></audio></div>`
        : `<div style="font-size:10px;color:var(--text-mute);margin-top:4px">No audio — <a href="${esc(item.link)}" target="_blank" style="color:#4a9fff">open episode ↗</a></div>`
      }
    </div>`;
  return card;
}

function buildArticleCard(feed, query, delay) {
  const card = document.createElement('div');
  card.className = 'feed-card';
  card.style.animationDelay = delay + 'ms';

  card.innerHTML = `<div class="card-header">
    <span class="card-dot" style="background:${feed.color||'#0078d4'}"></span>
    <span class="card-title">${esc(feed.label)}</span>
    ${feed.error ? `<span class="card-err">ERR</span>` : `<span class="card-count">${feed.items.length}</span>`}
  </div>`;

  if (feed.error) {
    const e = document.createElement('div');
    e.className = 'feed-error';
    e.textContent = 'Unavailable: ' + feed.error;
    card.appendChild(e); return card;
  }
  if (!feed.items.length) {
    const e = document.createElement('div');
    e.className = 'feed-error'; e.style.color = 'var(--text-mute)';
    e.textContent = query ? 'No matching articles.' : 'No articles.';
    card.appendChild(e); return card;
  }

  const now = Date.now();
  for (const item of feed.items) {
    const a = document.createElement('a');
    a.className = 'article'; a.href = item.link; a.target = '_blank'; a.rel = 'noopener noreferrer';
    const pub    = item.pubDate ? new Date(item.pubDate) : null;
    const isNew  = pub && (now - pub.getTime()) < 172800000;
    const ds     = pub ? pub.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    const title  = query ? hi(item.title, query) : esc(item.title);
    const summ   = item.summary ? (query ? hi(item.summary.slice(0,220),query) : esc(item.summary.slice(0,220))) : '';
    const tags   = (item.categories||[]).slice(0,3).map(t=>`<span class="article-tag">${esc(t)}</span>`).join('');
    a.innerHTML = `
      <div class="article-meta">
        ${ds?`<span class="article-date">${ds}</span>`:''}
        ${item.author?`<span class="article-author">${esc(item.author)}</span>`:''}
        ${isNew?'<span class="badge-new">NEW</span>':''}
      </div>
      <div class="article-title">${title}</div>
      ${summ?`<div class="article-summary">${summ}${(item.summary||'').length>220?'…':''}</div>`:''}
      ${tags?`<div class="article-tags">${tags}</div>`:''}`;
    card.appendChild(a);
  }
  return card;
}

let searchTimer;
function handleSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderAll(document.getElementById('search').value.toLowerCase().trim()), 180);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hi(text, q) {
  return esc(text).replace(
    new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),
    '<mark style="background:rgba(255,215,0,0.18);color:var(--yellow);border-radius:2px">$1</mark>'
  );
}

loadFeeds();
</script>
